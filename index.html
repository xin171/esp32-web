<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 LED 控制器</title>
  <!-- 使用 CDN 加载 mqtt.js（无需安装，浏览器直接运行） -->
  <script src="https://unpkg.com/mqtt@5.10.3/dist/mqtt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #16213e;
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 6px;
      color: #e94560;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    /* 连接状态 */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f3460;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: #4caf50;
      box-shadow: 0 0 8px #4caf50;
    }

    .status-dot.disconnected {
      background: #f44336;
      box-shadow: 0 0 8px #f44336;
    }

    .status-dot.connecting {
      background: #ff9800;
      box-shadow: 0 0 8px #ff9800;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 14px;
      flex: 1;
    }

    .status-detail {
      font-size: 11px;
      color: #999;
    }

    /* 服务器信息 */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .info-item {
      background: #0f3460;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
    }

    .info-item .label {
      color: #888;
      margin-bottom: 2px;
    }

    .info-item .value {
      color: #eee;
      font-family: monospace;
      font-size: 13px;
    }

    /* 控制按钮 */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .btn-on {
      background: #e94560;
    }

    .btn-on:hover:not(:disabled) {
      background: #d63851;
      box-shadow: 0 0 20px rgba(233,69,96,0.4);
    }

    .btn-off {
      background: #333;
    }

    .btn-off:hover:not(:disabled) {
      background: #444;
    }

    /* 消息日志 */
    .log-section {
      background: #0f3460;
      border-radius: 10px;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #0a2647;
      font-size: 13px;
    }

    .log-clear {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .log-clear:hover {
      background: #333;
      color: #eee;
    }

    .log-body {
      height: 180px;
      overflow-y: auto;
      padding: 8px 14px;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .log-body::-webkit-scrollbar {
      width: 4px;
    }

    .log-body::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 2px;
    }

    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid #1a1a3e;
    }

    .log-entry .time {
      color: #666;
      margin-right: 8px;
    }

    .log-entry .tag-sent {
      color: #4fc3f7;
    }

    .log-entry .tag-recv {
      color: #81c784;
    }

    .log-entry .tag-info {
      color: #ffb74d;
    }

    .log-entry .tag-err {
      color: #e57373;
    }

    .log-empty {
      color: #555;
      text-align: center;
      padding-top: 40px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔌 ESP32 LED 控制器</h1>
  <p class="subtitle">通过 MQTT WebSocket 控制开关灯</p>

  <!-- 连接状态 -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div>
      <div class="status-text" id="statusText">未连接</div>
      <div class="status-detail" id="statusDetail">点击下方按钮开始</div>
    </div>
  </div>

  <!-- 服务器信息 -->
  <div class="info-grid">
    <div class="info-item">
      <div class="label">服务器</div>
      <div class="value">broker.hivemq.com</div>
    </div>
    <div class="info-item">
      <div class="label">端口 (WSS)</div>
      <div class="value">8884</div>
    </div>
    <div class="info-item">
      <div class="label">主题</div>
      <div class="value" id="topicDisplay">esp32/wokwi/led</div>
    </div>
    <div class="info-item">
      <div class="label">客户端 ID</div>
      <div class="value" id="clientIdDisplay">-</div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="btn btn-on" id="btnOn" disabled>🔴 ON</button>
    <button class="btn btn-off" id="btnOff" disabled>⚫ OFF</button>
  </div>

  <!-- 消息日志 -->
  <div class="log-section">
    <div class="log-header">
      <span>📋 消息日志</span>
      <button class="log-clear" id="btnClearLog">清空</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty">等待连接...</div>
    </div>
  </div>
</div>

<script>
// ===================== 配置 =====================
const MQTT_CONFIG = {
  server:   'wss://broker.hivemq.com:8884/mqtt',
  topic:    'esp32/wokwi/led',
  clientId: 'xin_html_controller_' + Math.random().toString(36).slice(2, 6),
};

// ===================== DOM 引用 =====================
const dom = {
  dot:         document.getElementById('statusDot'),
  statusText:  document.getElementById('statusText'),
  statusDetail:document.getElementById('statusDetail'),
  clientId:    document.getElementById('clientIdDisplay'),
  topic:       document.getElementById('topicDisplay'),
  btnOn:       document.getElementById('btnOn'),
  btnOff:      document.getElementById('btnOff'),
  logBody:     document.getElementById('logBody'),
  btnClear:    document.getElementById('btnClearLog'),
};

// ===================== MQTT 客户端 =====================
let client = null;
let reconnectTimer = null;

// 设置状态
function setStatus(state, text, detail) {
  dom.dot.className = 'status-dot ' + state;
  dom.statusText.textContent = text;
  if (detail) dom.statusDetail.textContent = detail;
}

// 启用/禁用按钮
function setButtonsEnabled(enabled) {
  dom.btnOn.disabled = !enabled;
  dom.btnOff.disabled = !enabled;
}

// 添加日志
function addLog(tag, msg) {
  const empty = dom.logBody.querySelector('.log-empty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const time = new Date().toLocaleTimeString();
  let tagClass = '';
  if (tag === '📤') tagClass = 'tag-sent';
  else if (tag === '📩') tagClass = 'tag-recv';
  else if (tag === 'ℹ️') tagClass = 'tag-info';
  else if (tag === '❌') tagClass = 'tag-err';
  entry.innerHTML = `<span class="time">[${time}]</span><span class="${tagClass}">${tag}</span> ${msg}`;
  dom.logBody.appendChild(entry);
  dom.logBody.scrollTop = dom.logBody.scrollHeight;
}

// 清空日志
dom.btnClear.addEventListener('click', () => {
  dom.logBody.innerHTML = '<div class="log-empty">日志已清空</div>';
});

// ===================== MQTT 连接 =====================
function connectMQTT() {
  if (client) {
    try { client.end(true); } catch(e) {}
    client = null;
  }

  setStatus('connecting', '连接中...', `正在连接 ${MQTT_CONFIG.server}`);
  dom.clientId.textContent = MQTT_CONFIG.clientId;
  setButtonsEnabled(false);

  addLog('ℹ️', `正在连接 ${MQTT_CONFIG.server} ...`);

  try {
    client = mqtt.connect(MQTT_CONFIG.server, {
      clientId: MQTT_CONFIG.clientId,
      clean: true,
      reconnectPeriod: 5000,        // 断线后 5 秒重连
      connectTimeout: 10000,
      keepalive: 30,
    });

    client.on('connect', () => {
      setStatus('connected', '✅ 已连接', `客户端: ${MQTT_CONFIG.clientId}`);
      setButtonsEnabled(true);
      addLog('✅', `已连接到 broker.hivemq.com`);

      // 订阅主题
      client.subscribe(MQTT_CONFIG.topic, { qos: 0 }, (err) => {
        if (err) {
          addLog('❌', `订阅失败: ${err.message}`);
        } else {
          addLog('📡', `已订阅 ${MQTT_CONFIG.topic}`);
        }
      });
    });

    client.on('message', (topic, payload) => {
      const msg = payload.toString();
      addLog('📩', `收到: "${msg}"  (主题: ${topic})`);
    });

    client.on('reconnect', () => {
      setStatus('connecting', '重连中...', '5 秒后自动重试');
      setButtonsEnabled(false);
      addLog('ℹ️', '连接断开，准备重连...');
    });

    client.on('close', () => {
      if (client && client.connected) return;
      setStatus('disconnected', '已断开', '等待自动重连...');
      setButtonsEnabled(false);
    });

    client.on('offline', () => {
      setStatus('disconnected', '离线', '网络连接丢失');
      setButtonsEnabled(false);
    });

    client.on('error', (err) => {
      addLog('❌', `连接错误: ${err.message || err}`);
      setStatus('disconnected', '连接失败', err.message || '未知错误');
      setButtonsEnabled(false);
    });

  } catch (err) {
    addLog('❌', `创建客户端失败: ${err.message}`);
    setStatus('disconnected', '初始化失败', err.message);
  }
}

// ===================== 发送消息 =====================
function sendMessage(msg) {
  if (!client || !client.connected) {
    addLog('❌', '未连接，无法发送');
    return;
  }

  client.publish(MQTT_CONFIG.topic, msg, { qos: 0 }, (err) => {
    if (err) {
      addLog('❌', `发送 "${msg}" 失败: ${err.message}`);
    } else {
      addLog('📤', `发送 "${msg}"`);
    }
  });
}

dom.btnOn.addEventListener('click', () => sendMessage('on'));
dom.btnOff.addEventListener('click', () => sendMessage('off'));

// ===================== 初始化 =====================
dom.topic.textContent = MQTT_CONFIG.topic;
connectMQTT();
</script>
</body>
</html>
